<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduBridge AI</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(10,10,15,0) 70%);
            z-index: -1;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .form-options a {
            color: var(--primary);
            text-decoration: none;
        }
        .demo-credentials {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.875rem;
        }
        .demo-btn {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            margin: 0.25rem;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .demo-btn:hover {
            color: white;
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card animate-fade-in">
            <div class="auth-header">
                <a href="../../index.html" class="nav-brand" style="justify-content: center; margin-bottom: 1rem;">
                    <i class="fa-solid fa-bridge-water text-gradient"></i> EduBridge AI
                </a>
                <h1>Welcome back</h1>
                <p class="text-muted">Enter your details to access your dashboard</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>

                <div class="form-options">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign in <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted" style="font-size: 0.875rem;">
                    Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none;">Sign up</a>
                </p>
            </div>

            <div class="demo-credentials">
                <p class="text-muted" style="margin-bottom: 0.5rem;">One-click Demo Accounts (Password: Demo@123)</p>
                <div style="display: flex; flex-wrap: wrap; justify-content: center;">
                    <button class="demo-btn" onclick="fillDemo('student')">Student</button>
                    <button class="demo-btn" onclick="fillDemo('parent')">Parent</button>
                    <button class="demo-btn" onclick="fillDemo('school')">School</button>
                    <button class="demo-btn" onclick="fillDemo('donor')">Donor</button>
                    <button class="demo-btn" onclick="fillDemo('admin')">Admin</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/core/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing in...';
            btn.disabled = true;

            try {
                const data = await API.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                
                UI.showToast('Login successful! Redirecting...', 'success');
                
                // Route to correct dashboard based on role
                setTimeout(() => {
                    const role = data.user.role;
                    if (role === 'student') window.location.href = 'student-dashboard.html';
                    else if (role === 'school') window.location.href = 'school-dashboard.html';
                    else if (role === 'donor') window.location.href = 'donor-dashboard.html';
                    else if (role === 'admin') window.location.href = 'admin-dashboard.html';
                    else window.location.href = '../../index.html';
                }, 1000);
            } catch (error) {
                UI.showToast(error.message, 'error');
                btn.innerHTML = 'Sign in <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>';
                btn.disabled = false;
            }
        });

        function fillDemo(role) {
            document.getElementById('email').value = `${role}@demo.com`;
            document.getElementById('password').value = 'Demo@123';
        }
    </script>
</body>
</html>
